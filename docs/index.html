<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundFont Validator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>SoundFont File Validator</h1>
      </section>

      <section class="panel">
        <label class="upload" for="soundfont-file">
          <span class="upload-title">Choose a sf2 file</span>
          <span class="upload-subtitle">Nothing is uploaded. Validation runs entirely in your browser.</span>
          <input id="soundfont-file" type="file" accept=".sf2,application/octet-stream" />
        </label>

        <div id="status" class="status status-idle">
          <h2>Waiting for file</h2>
          <p>Select a SoundFont file to validate it.</p>
        </div>

        <dl id="summary" class="summary" hidden>
          <div>
            <dt>Presets</dt>
            <dd id="summary-presets">0</dd>
          </div>
          <div>
            <dt>Instruments</dt>
            <dd id="summary-instruments">0</dd>
          </div>
          <div>
            <dt>Samples</dt>
            <dd id="summary-samples">0</dd>
          </div>
          <div>
            <dt>PCM frames</dt>
            <dd id="summary-sample-data">0</dd>
          </div>
        </dl>

        <section id="details" class="details" hidden>
          <h3>Validation details</h3>
          <ul id="details-list"></ul>
        </section>
      </section>

      <footer class="footer">
        <p>
          <a href="https://github.com/nberr/sf2-validator" target="_blank" rel="noreferrer">
            View source on GitHub
          </a>
        </p>
      </footer>
    </main>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
